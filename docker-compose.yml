name: hsp-infra

services:
  mysql:
    image: mysql:8.0
    container_name: hsp-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DEFAULT_DATABASE}
      MYSQL_ROOT_HOST: "%"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - hsp-net

  api-gateway:
    image: ${API_GATEWAY_IMAGE}:${API_GATEWAY_TAG}
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_started
      order-service:
        condition: service_started
      worker-schedule-service:
        condition: service_started
      dispatch-service:
        condition: service_started
      payment-settlement-service:
        condition: service_started
    environment:
      GATEWAY_HOST: ${GATEWAY_HOST:-0.0.0.0}
      GATEWAY_PORT: ${GATEWAY_PORT:-8081}
      JWT_SECRET: ${GATEWAY_JWT_SECRET:?GATEWAY_JWT_SECRET is required}
      JWT_ISSUER: ${JWT_ISSUER:-hsp-user-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-hsp-api}
      USER_GRPC_TARGET: ${USER_GRPC_TARGET:-user-service:50051}
      ORDER_GRPC_TARGET: ${ORDER_GRPC_TARGET:-order-service:50052}
      DISPATCH_GRPC_TARGET: ${DISPATCH_GRPC_TARGET:-dispatch-service:50054}
      WORKER_SCHEDULE_GRPC_TARGET: ${WORKER_SCHEDULE_GRPC_TARGET:-worker-schedule-service:50055}
      FINANCE_GRPC_TARGET: ${FINANCE_GRPC_TARGET:-payment-settlement-service:50053}
      GRPC_TIMEOUT_MS: ${GRPC_TIMEOUT_MS:-3000}
    expose:
      - "${GATEWAY_PORT:-8081}"
    networks:
      - hsp-net

  user-service:
    image: ${USER_SERVICE_IMAGE}:${USER_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HSP_USER_SERVICE_SERVICE_NAME: ${HSP_USER_SERVICE_SERVICE_NAME:-hsp-user-service}
      HSP_USER_SERVICE_ENV: ${HSP_USER_SERVICE_ENV:-dev}
      HSP_USER_SERVICE_LOG_LEVEL: ${HSP_USER_SERVICE_LOG_LEVEL:-INFO}
      HSP_USER_SERVICE_GRPC_HOST: ${HSP_USER_SERVICE_GRPC_HOST:-0.0.0.0}
      HSP_USER_SERVICE_GRPC_PORT: ${HSP_USER_SERVICE_GRPC_PORT:-50051}
      HSP_USER_SERVICE_GRPC_TARGET: ${HSP_USER_SERVICE_GRPC_TARGET:-user-service:50051}
      HSP_USER_SERVICE_HTTP_HOST: ${HSP_USER_SERVICE_HTTP_HOST:-0.0.0.0}
      HSP_USER_SERVICE_HTTP_PORT: ${HSP_USER_SERVICE_HTTP_PORT:-8080}
      HSP_USER_SERVICE_USE_MOCK_REPOSITORY: ${HSP_USER_SERVICE_USE_MOCK_REPOSITORY:-false}
      HSP_USER_SERVICE_MYSQL_DSN: ${HSP_USER_SERVICE_MYSQL_DSN:-mysql+aiomysql://root:root@mysql:3306/user_db}
    expose:
      - "${HSP_USER_SERVICE_HTTP_PORT:-8080}"
      - "${HSP_USER_SERVICE_GRPC_PORT:-50051}"
    networks:
      - hsp-net

  order-service:
    image: ${ORDER_SERVICE_IMAGE}:${ORDER_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HSP_ORDER_SERVICE_SERVICE_NAME: ${HSP_ORDER_SERVICE_SERVICE_NAME:-hsp-order-service}
      HSP_ORDER_SERVICE_ENV: ${HSP_ORDER_SERVICE_ENV:-dev}
      HSP_ORDER_SERVICE_LOG_LEVEL: ${HSP_ORDER_SERVICE_LOG_LEVEL:-INFO}
      HSP_ORDER_SERVICE_GRPC_HOST: ${HSP_ORDER_SERVICE_GRPC_HOST:-0.0.0.0}
      HSP_ORDER_SERVICE_GRPC_PORT: ${HSP_ORDER_SERVICE_GRPC_PORT:-50052}
      HSP_ORDER_SERVICE_GRPC_TARGET: ${HSP_ORDER_SERVICE_GRPC_TARGET:-order-service:50052}
      HSP_ORDER_SERVICE_HTTP_HOST: ${HSP_ORDER_SERVICE_HTTP_HOST:-0.0.0.0}
      HSP_ORDER_SERVICE_HTTP_PORT: ${HSP_ORDER_SERVICE_HTTP_PORT:-8080}
      HSP_ORDER_SERVICE_USE_MOCK_REPOSITORY: ${HSP_ORDER_SERVICE_USE_MOCK_REPOSITORY:-false}
      HSP_ORDER_SERVICE_MYSQL_DSN: ${HSP_ORDER_SERVICE_MYSQL_DSN:-mysql+aiomysql://root:root@mysql:3306/order_db}
    expose:
      - "${HSP_ORDER_SERVICE_HTTP_PORT:-8080}"
      - "${HSP_ORDER_SERVICE_GRPC_PORT:-50052}"
    networks:
      - hsp-net

  worker-schedule-service:
    image: ${WORKER_SCHEDULE_SERVICE_IMAGE}:${WORKER_SCHEDULE_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HSP_WORKER_SCHEDULE_SERVICE_SERVICE_NAME: ${HSP_WORKER_SCHEDULE_SERVICE_SERVICE_NAME:-hsp-worker-schedule-service}
      HSP_WORKER_SCHEDULE_SERVICE_ENV: ${HSP_WORKER_SCHEDULE_SERVICE_ENV:-dev}
      HSP_WORKER_SCHEDULE_SERVICE_LOG_LEVEL: ${HSP_WORKER_SCHEDULE_SERVICE_LOG_LEVEL:-INFO}
      HSP_WORKER_SCHEDULE_SERVICE_GRPC_HOST: ${HSP_WORKER_SCHEDULE_SERVICE_GRPC_HOST:-0.0.0.0}
      HSP_WORKER_SCHEDULE_SERVICE_GRPC_PORT: ${HSP_WORKER_SCHEDULE_SERVICE_GRPC_PORT:-50055}
      HSP_WORKER_SCHEDULE_SERVICE_GRPC_TARGET: ${HSP_WORKER_SCHEDULE_SERVICE_GRPC_TARGET:-worker-schedule-service:50055}
      HSP_WORKER_SCHEDULE_SERVICE_HTTP_HOST: ${HSP_WORKER_SCHEDULE_SERVICE_HTTP_HOST:-0.0.0.0}
      HSP_WORKER_SCHEDULE_SERVICE_HTTP_PORT: ${HSP_WORKER_SCHEDULE_SERVICE_HTTP_PORT:-8080}
      HSP_WORKER_SCHEDULE_SERVICE_USE_MOCK_REPOSITORY: ${HSP_WORKER_SCHEDULE_SERVICE_USE_MOCK_REPOSITORY:-false}
      HSP_WORKER_SCHEDULE_SERVICE_MYSQL_DSN: ${HSP_WORKER_SCHEDULE_SERVICE_MYSQL_DSN:-mysql+aiomysql://root:root@mysql:3306/schedule_db}
    expose:
      - "${HSP_WORKER_SCHEDULE_SERVICE_HTTP_PORT:-8080}"
      - "${HSP_WORKER_SCHEDULE_SERVICE_GRPC_PORT:-50055}"
    networks:
      - hsp-net

  dispatch-service:
    image: ${DISPATCH_SERVICE_IMAGE}:${DISPATCH_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HSP_DISPATCH_SERVICE_SERVICE_NAME: ${HSP_DISPATCH_SERVICE_SERVICE_NAME:-hsp-dispatch-service}
      HSP_DISPATCH_SERVICE_ENV: ${HSP_DISPATCH_SERVICE_ENV:-dev}
      HSP_DISPATCH_SERVICE_LOG_LEVEL: ${HSP_DISPATCH_SERVICE_LOG_LEVEL:-INFO}
      HSP_DISPATCH_SERVICE_GRPC_HOST: ${HSP_DISPATCH_SERVICE_GRPC_HOST:-0.0.0.0}
      HSP_DISPATCH_SERVICE_GRPC_PORT: ${HSP_DISPATCH_SERVICE_GRPC_PORT:-50054}
      HSP_DISPATCH_SERVICE_GRPC_TARGET: ${HSP_DISPATCH_SERVICE_GRPC_TARGET:-dispatch-service:50054}
      HSP_DISPATCH_SERVICE_HTTP_HOST: ${HSP_DISPATCH_SERVICE_HTTP_HOST:-0.0.0.0}
      HSP_DISPATCH_SERVICE_HTTP_PORT: ${HSP_DISPATCH_SERVICE_HTTP_PORT:-8080}
      HSP_DISPATCH_SERVICE_USE_MOCK_REPOSITORY: ${HSP_DISPATCH_SERVICE_USE_MOCK_REPOSITORY:-false}
      HSP_DISPATCH_SERVICE_MYSQL_DSN: ${HSP_DISPATCH_SERVICE_MYSQL_DSN:-mysql+aiomysql://root:root@mysql:3306/dispatch_db}
    expose:
      - "${HSP_DISPATCH_SERVICE_HTTP_PORT:-8080}"
      - "${HSP_DISPATCH_SERVICE_GRPC_PORT:-50054}"
    networks:
      - hsp-net

  execution-record-service:
    image: ${EXECUTION_RECORD_SERVICE_IMAGE}:${EXECUTION_RECORD_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HSP_EXECUTION_RECORD_SERVICE_SERVICE_NAME: ${HSP_EXECUTION_RECORD_SERVICE_SERVICE_NAME:-hsp-execution-record-service}
      HSP_EXECUTION_RECORD_SERVICE_ENV: ${HSP_EXECUTION_RECORD_SERVICE_ENV:-dev}
      HSP_EXECUTION_RECORD_SERVICE_LOG_LEVEL: ${HSP_EXECUTION_RECORD_SERVICE_LOG_LEVEL:-INFO}
      HSP_EXECUTION_RECORD_SERVICE_GRPC_HOST: ${HSP_EXECUTION_RECORD_SERVICE_GRPC_HOST:-0.0.0.0}
      HSP_EXECUTION_RECORD_SERVICE_GRPC_PORT: ${HSP_EXECUTION_RECORD_SERVICE_GRPC_PORT:-50051}
      HSP_EXECUTION_RECORD_SERVICE_GRPC_TARGET: ${HSP_EXECUTION_RECORD_SERVICE_GRPC_TARGET:-execution-record-service:50051}
      HSP_EXECUTION_RECORD_SERVICE_HTTP_HOST: ${HSP_EXECUTION_RECORD_SERVICE_HTTP_HOST:-0.0.0.0}
      HSP_EXECUTION_RECORD_SERVICE_HTTP_PORT: ${HSP_EXECUTION_RECORD_SERVICE_HTTP_PORT:-8080}
      HSP_EXECUTION_RECORD_SERVICE_USE_MOCK_REPOSITORY: ${HSP_EXECUTION_RECORD_SERVICE_USE_MOCK_REPOSITORY:-false}
      HSP_EXECUTION_RECORD_SERVICE_MYSQL_DSN: ${HSP_EXECUTION_RECORD_SERVICE_MYSQL_DSN:-mysql+aiomysql://root:root@mysql:3306/execution_db}
    expose:
      - "${HSP_EXECUTION_RECORD_SERVICE_HTTP_PORT:-8080}"
      - "${HSP_EXECUTION_RECORD_SERVICE_GRPC_PORT:-50051}"
    networks:
      - hsp-net

  payment-settlement-service:
    image: ${PAYMENT_SETTLEMENT_SERVICE_IMAGE}:${PAYMENT_SETTLEMENT_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HSP_PAYMENT_SETTLEMENT_SERVICE_SERVICE_NAME: ${HSP_PAYMENT_SETTLEMENT_SERVICE_SERVICE_NAME:-hsp-payment-settlement-service}
      HSP_PAYMENT_SETTLEMENT_SERVICE_ENV: ${HSP_PAYMENT_SETTLEMENT_SERVICE_ENV:-dev}
      HSP_PAYMENT_SETTLEMENT_SERVICE_LOG_LEVEL: ${HSP_PAYMENT_SETTLEMENT_SERVICE_LOG_LEVEL:-INFO}
      HSP_PAYMENT_SETTLEMENT_SERVICE_GRPC_HOST: ${HSP_PAYMENT_SETTLEMENT_SERVICE_GRPC_HOST:-0.0.0.0}
      HSP_PAYMENT_SETTLEMENT_SERVICE_GRPC_PORT: ${HSP_PAYMENT_SETTLEMENT_SERVICE_GRPC_PORT:-50053}
      HSP_PAYMENT_SETTLEMENT_SERVICE_GRPC_TARGET: ${HSP_PAYMENT_SETTLEMENT_SERVICE_GRPC_TARGET:-payment-settlement-service:50053}
      HSP_PAYMENT_SETTLEMENT_SERVICE_HTTP_HOST: ${HSP_PAYMENT_SETTLEMENT_SERVICE_HTTP_HOST:-0.0.0.0}
      HSP_PAYMENT_SETTLEMENT_SERVICE_HTTP_PORT: ${HSP_PAYMENT_SETTLEMENT_SERVICE_HTTP_PORT:-8080}
      HSP_PAYMENT_SETTLEMENT_SERVICE_USE_MOCK_REPOSITORY: ${HSP_PAYMENT_SETTLEMENT_SERVICE_USE_MOCK_REPOSITORY:-false}
      HSP_PAYMENT_SETTLEMENT_SERVICE_MYSQL_DSN: ${HSP_PAYMENT_SETTLEMENT_SERVICE_MYSQL_DSN:-mysql+aiomysql://root:root@mysql:3306/payment_db}
    expose:
      - "${HSP_PAYMENT_SETTLEMENT_SERVICE_HTTP_PORT:-8080}"
      - "${HSP_PAYMENT_SETTLEMENT_SERVICE_GRPC_PORT:-50053}"
    networks:
      - hsp-net

  # frontend:
  #   image: ${FRONTEND_IMAGE}:${FRONTEND_TAG}
  #   restart: unless-stopped
  #   environment:
  #     PORT: ${FRONTEND_PORT}
  #     API_BASE_URL: ${FRONTEND_API_BASE_URL}
  #   ports:
  #     - "${FRONTEND_HOST_PORT}:${FRONTEND_PORT}"
  #   networks:
  #     - hsp-net

  nginx:
    image: nginx:1.27-alpine
    container_name: hsp-nginx
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "${NGINX_HOST_PORT}:${NGINX_HTTP_PORT}" # 80:80
      - "${NGINX_SSL_HOST_PORT}:${NGINX_HTTPS_PORT}" # 443:443
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/hsp-web-frontend:/var/www/hsp-web-frontend:ro
    networks:
      - hsp-net

networks:
  hsp-net:
    name: hsp-net
    driver: bridge

volumes:
  mysql-data:
    name: mysql-data
