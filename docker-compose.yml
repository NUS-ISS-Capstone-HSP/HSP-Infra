name: hsp-infra

services:
  mysql:
    image: mysql:8.0
    container_name: hsp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DEFAULT_DATABASE}
      MYSQL_ROOT_HOST: "%"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_HOST_PORT}:${MYSQL_PORT}"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - hsp-net

  user-service:
    image: ${USER_SERVICE_IMAGE}:${USER_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVICE_NAME: user-service
      SERVER_PORT: ${USER_SERVICE_PORT}
      DB_HOST: mysql
      DB_PORT: ${MYSQL_PORT}
      DB_NAME: ${USER_DB_NAME}
      DB_USER: root
      DB_PASSWORD: root
    ports:
      - "${USER_SERVICE_HOST_PORT}:${USER_SERVICE_PORT}"
    networks:
      - hsp-net

  order-service:
    image: ${ORDER_SERVICE_IMAGE}:${ORDER_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVICE_NAME: order-service
      SERVER_PORT: ${ORDER_SERVICE_PORT}
      DB_HOST: mysql
      DB_PORT: ${MYSQL_PORT}
      DB_NAME: ${ORDER_DB_NAME}
      DB_USER: root
      DB_PASSWORD: root
    ports:
      - "${ORDER_SERVICE_HOST_PORT}:${ORDER_SERVICE_PORT}"
    networks:
      - hsp-net

  worker-schedule-service:
    image: ${WORKER_SCHEDULE_SERVICE_IMAGE}:${WORKER_SCHEDULE_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVICE_NAME: worker-schedule-service
      SERVER_PORT: ${WORKER_SCHEDULE_SERVICE_PORT}
      DB_HOST: mysql
      DB_PORT: ${MYSQL_PORT}
      DB_NAME: ${SCHEDULE_DB_NAME}
      DB_USER: root
      DB_PASSWORD: root
    ports:
      - "${WORKER_SCHEDULE_SERVICE_HOST_PORT}:${WORKER_SCHEDULE_SERVICE_PORT}"
    networks:
      - hsp-net

  dispatch-service:
    image: ${DISPATCH_SERVICE_IMAGE}:${DISPATCH_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVICE_NAME: dispatch-service
      SERVER_PORT: ${DISPATCH_SERVICE_PORT}
      DB_HOST: mysql
      DB_PORT: ${MYSQL_PORT}
      DB_NAME: ${DISPATCH_DB_NAME}
      DB_USER: root
      DB_PASSWORD: root
    ports:
      - "${DISPATCH_SERVICE_HOST_PORT}:${DISPATCH_SERVICE_PORT}"
    networks:
      - hsp-net

  execution-record-service:
    image: ${EXECUTION_RECORD_SERVICE_IMAGE}:${EXECUTION_RECORD_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVICE_NAME: execution-record-service
      SERVER_PORT: ${EXECUTION_RECORD_SERVICE_PORT}
      DB_HOST: mysql
      DB_PORT: ${MYSQL_PORT}
      DB_NAME: ${EXECUTION_DB_NAME}
      DB_USER: root
      DB_PASSWORD: root
    ports:
      - "${EXECUTION_RECORD_SERVICE_HOST_PORT}:${EXECUTION_RECORD_SERVICE_PORT}"
    networks:
      - hsp-net

  payment-settlement-service:
    image: ${PAYMENT_SETTLEMENT_SERVICE_IMAGE}:${PAYMENT_SETTLEMENT_SERVICE_TAG}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVICE_NAME: payment-settlement-service
      SERVER_PORT: ${PAYMENT_SETTLEMENT_SERVICE_PORT}
      DB_HOST: mysql
      DB_PORT: ${MYSQL_PORT}
      DB_NAME: ${PAYMENT_DB_NAME}
      DB_USER: root
      DB_PASSWORD: root
    ports:
      - "${PAYMENT_SETTLEMENT_SERVICE_HOST_PORT}:${PAYMENT_SETTLEMENT_SERVICE_PORT}"
    networks:
      - hsp-net

  # frontend:
  #   image: ${FRONTEND_IMAGE}:${FRONTEND_TAG}
  #   restart: unless-stopped
  #   environment:
  #     PORT: ${FRONTEND_PORT}
  #     API_BASE_URL: ${FRONTEND_API_BASE_URL}
  #   ports:
  #     - "${FRONTEND_HOST_PORT}:${FRONTEND_PORT}"
  #   networks:
  #     - hsp-net

  nginx:
    image: nginx:1.27-alpine
    container_name: hsp-nginx
    restart: unless-stopped
    depends_on:
      # - frontend
      - user-service
      - order-service
      - worker-schedule-service
      - dispatch-service
      - execution-record-service
      - payment-settlement-service
    ports:
      - "${NGINX_HOST_PORT}:${NGINX_HTTP_PORT}"
      - "${NGINX_SSL_HOST_PORT}:${NGINX_HTTPS_PORT}"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hsp-net

networks:
  hsp-net:
    name: hsp-net
    driver: bridge

volumes:
  mysql-data:
    name: mysql-data
