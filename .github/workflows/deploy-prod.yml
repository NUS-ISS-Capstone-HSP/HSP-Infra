name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy by SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            if [ -z "${{ secrets.ALIYUN_REGISTRY }}" ] || [ -z "${{ secrets.ALIYUN_USERNAME }}" ] || [ -z "${{ secrets.ALIYUN_PASSWORD }}" ] || [ -z "${{ secrets.ALIYUN_NAMESPACE }}" ] || [ -z "${{ secrets.PROD_GATEWAY_JWT_SECRET }}" ]; then
              echo "Missing secrets: ALIYUN_REGISTRY / ALIYUN_USERNAME / ALIYUN_PASSWORD / ALIYUN_NAMESPACE / PROD_GATEWAY_JWT_SECRET" >&2
              exit 1
            fi
            cd "${{ secrets.PROD_INFRA_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login "${{ secrets.ALIYUN_REGISTRY }}" -u "${{ secrets.ALIYUN_USERNAME }}" --password-stdin
            export GATEWAY_JWT_SECRET="${{ secrets.PROD_GATEWAY_JWT_SECRET }}"
            docker compose --env-file env/prod.env --env-file env/image-tags.env -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose --env-file env/prod.env --env-file env/image-tags.env -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker exec hsp-nginx nginx -s reload

  api-interface-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs:
      - deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gateway health check through nginx
        shell: bash
        env:
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
        run: |
          set -euo pipefail
          if [[ -n "${PROD_API_BASE_URL}" ]]; then
            export GATEWAY_TEST_BASE_URL="${PROD_API_BASE_URL}"
          else
            export GATEWAY_TEST_BASE_URL="http://${PROD_SSH_HOST}:80"
          fi
          curl -fsS "${GATEWAY_TEST_BASE_URL%/}/api/healthz"
