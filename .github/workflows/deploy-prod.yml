name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Production deployment
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment inputs
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_INFRA_PATH: ${{ secrets.PROD_INFRA_PATH }}
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
          ALIYUN_NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}
          PROD_GATEWAY_JWT_SECRET: ${{ secrets.PROD_GATEWAY_JWT_SECRET }}
        run: |
          set -euo pipefail
          required=(
            PROD_SSH_HOST
            PROD_SSH_USER
            PROD_SSH_KEY
            PROD_INFRA_PATH
            ALIYUN_REGISTRY
            ALIYUN_USERNAME
            ALIYUN_PASSWORD
            ALIYUN_NAMESPACE
            PROD_GATEWAY_JWT_SECRET
          )

          for key in "${required[@]}"; do
            if [[ -z "${!key}" ]]; then
              echo "Missing secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Sync infra repository
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            cd "${{ secrets.PROD_INFRA_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

      - name: Login to container registry
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login "${{ secrets.ALIYUN_REGISTRY }}" -u "${{ secrets.ALIYUN_USERNAME }}" --password-stdin

      - name: Pull production images
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            cd "${{ secrets.PROD_INFRA_PATH }}"
            export GATEWAY_JWT_SECRET="${{ secrets.PROD_GATEWAY_JWT_SECRET }}"
            docker compose --env-file env/prod.env --env-file env/image-tags.env -f docker-compose.yml -f docker-compose.prod.yml pull

      - name: Recreate production stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            cd "${{ secrets.PROD_INFRA_PATH }}"
            export GATEWAY_JWT_SECRET="${{ secrets.PROD_GATEWAY_JWT_SECRET }}"
            docker compose --env-file env/prod.env --env-file env/image-tags.env -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            docker exec hsp-nginx nginx -s reload

  gateway-health-check:
    name: Gateway health check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs:
      - deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate gateway health check inputs
        shell: bash
        env:
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${PROD_API_BASE_URL}" ]]; then
            echo "Missing secret: PROD_API_BASE_URL" >&2
            exit 1
          fi

      - name: Gateway health check
        shell: bash
        env:
          GATEWAY_HEALTH_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
        run: ./scripts/integration/gateway-health-check.sh

      - name: Upload gateway health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-health-report
          path: reports/gateway-health/
          if-no-files-found: ignore

  api-interface-tests:
    name: API interface tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs:
      - gateway-health-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate API interface test inputs
        shell: bash
        env:
          BRUNO_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
        run: |
          set -euo pipefail
          required=(
            BRUNO_API_BASE_URL
          )

          for key in "${required[@]}"; do
            if [[ -z "${!key}" ]]; then
              echo "Missing secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: API interface tests
        shell: bash
        env:
          BRUNO_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          BRUNO_API_TESTS_ENABLED: ${{ vars.BRUNO_API_TESTS_ENABLED || 'true' }}
        run: ./scripts/integration/bruno-api-tests.sh

      - name: Upload API interface report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-interface-report
          path: reports/api-interface/
          if-no-files-found: ignore

  frontend-smoke-test:
    name: Frontend smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs:
      - api-interface-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium firefox webkit chrome

      - name: Run frontend smoke test
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PROD_WEB_BASE_URL || secrets.PROD_API_BASE_URL }}
        run: npm run test:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-smoke-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  publish-verification-summary:
    name: Publish verification summary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    if: always()
    needs:
      - deploy
      - gateway-health-check
      - api-interface-tests
      - frontend-smoke-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish verification summary
        shell: bash
        env:
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          GATEWAY_RESULT: ${{ needs.gateway-health-check.result }}
          API_TEST_RESULT: ${{ needs.api-interface-tests.result }}
          FRONTEND_RESULT: ${{ needs.frontend-smoke-test.result }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          {
            echo "## Production Deployment Verification"
            echo
            echo "| Stage | Result |"
            echo "| --- | --- |"
            echo "| Deploy production stack | ${DEPLOY_RESULT} |"
            echo "| Gateway health check | ${GATEWAY_RESULT} |"
            echo "| Bruno API interface tests | ${API_TEST_RESULT} |"
            echo "| Frontend smoke test | ${FRONTEND_RESULT} |"
            echo
            echo "| Deployment | Value |"
            echo "| --- | --- |"
            echo "| API base URL | \`${PROD_API_BASE_URL}\` |"
            echo "| Workflow run | ${GITHUB_RUN_URL} |"
            echo
            echo "### Image Manifest"
            echo
            echo "| Service | Image | Tag |"
            echo "| --- | --- | --- |"
          } >>"${GITHUB_STEP_SUMMARY}"

          services=(
            API_GATEWAY
            USER_SERVICE
            ORDER_SERVICE
            WORKER_SCHEDULE_SERVICE
            DISPATCH_SERVICE
            EXECUTION_RECORD_SERVICE
            PAYMENT_SETTLEMENT_SERVICE
            FRONTEND
          )

          set -a
          source env/image-tags.env
          set +a

          for service in "${services[@]}"; do
            image_key="${service}_IMAGE"
            tag_key="${service}_TAG"
            image="${!image_key:-}"
            tag="${!tag_key:-}"
            if [[ -n "${image}" || -n "${tag}" ]]; then
              echo "| ${service} | \`${image}\` | \`${tag}\` |" >>"${GITHUB_STEP_SUMMARY}"
            fi
          done

          if [[ "${DEPLOY_RESULT}" != "success" || "${GATEWAY_RESULT}" != "success" || "${API_TEST_RESULT}" != "success" || "${FRONTEND_RESULT}" != "success" ]]; then
            echo "One or more production verification stages failed." >&2
            exit 1
          fi
