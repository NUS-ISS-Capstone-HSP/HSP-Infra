name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Production deployment
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment inputs
        shell: bash
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_INFRA_PATH: ${{ secrets.PROD_INFRA_PATH }}
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
          ALIYUN_NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}
          PROD_GATEWAY_JWT_SECRET: ${{ secrets.PROD_GATEWAY_JWT_SECRET }}
          PROD_FRONTEND_BASE_URL: ${{ secrets.PROD_FRONTEND_BASE_URL }}
        run: |
          set -euo pipefail
          required=(
            PROD_SSH_HOST
            PROD_SSH_USER
            PROD_SSH_KEY
            PROD_INFRA_PATH
            ALIYUN_REGISTRY
            ALIYUN_USERNAME
            ALIYUN_PASSWORD
            ALIYUN_NAMESPACE
            PROD_GATEWAY_JWT_SECRET
            PROD_FRONTEND_BASE_URL
          )

          for key in "${required[@]}"; do
            if [[ -z "${!key}" ]]; then
              echo "Missing secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Sync infra repository
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            cd "${{ secrets.PROD_INFRA_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

      - name: Login to container registry
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login "${{ secrets.ALIYUN_REGISTRY }}" -u "${{ secrets.ALIYUN_USERNAME }}" --password-stdin

      - name: Pull production images
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            cd "${{ secrets.PROD_INFRA_PATH }}"
            export GATEWAY_JWT_SECRET="${{ secrets.PROD_GATEWAY_JWT_SECRET }}"
            docker compose --env-file env/prod.env --env-file env/image-tags.env -f docker-compose.yml -f docker-compose.prod.yml pull

      - name: Recreate production stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            cd "${{ secrets.PROD_INFRA_PATH }}"
            export GATEWAY_JWT_SECRET="${{ secrets.PROD_GATEWAY_JWT_SECRET }}"
            docker compose --env-file env/prod.env --env-file env/image-tags.env -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            docker exec hsp-nginx nginx -s reload

  prepare-verification-context:
    name: Prepare verification context
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs:
      - deploy

    steps:
      - name: Prepare verification context
        run: echo "still in progress"

  gateway-health-check:
    name: Gateway health check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs:
      - prepare-verification-context

    steps:
      - name: Gateway health check
        run: echo "still in progress"

  api-interface-tests:
    name: API interface tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs:
      - gateway-health-check

    steps:
      - name: API interface tests
        run: echo "still in progress"

  integration-test-suite:
    name: Integration test suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs:
      - api-interface-tests

    steps:
      - name: Integration test suite
        run: echo "still in progress"

  frontend-smoke-test:
    name: Frontend smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs:
      - integration-test-suite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium firefox webkit chrome

      - name: Run frontend smoke test
        env:
          HSP_SMOKE_BASE_URL: ${{ secrets.PROD_FRONTEND_BASE_URL }}
        run: npm run test:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-smoke-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  publish-verification-summary:
    name: Publish verification summary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    needs:
      - frontend-smoke-test

    steps:
      - name: Publish verification summary
        shell: bash
        run: |
          set -euo pipefail
          echo "still in progress"
