name: CI Integration

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image tag env
        run: |
          if [ ! -f env/image-tags.env ]; then
            cp env/image-tags.env.example env/image-tags.env
          fi

      - name: Validate docker compose config
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source env/dev.env
          source env/image-tags.env
          set +a
          docker compose -f docker-compose.yml config > /tmp/docker-compose.rendered.yml

      - name: Start stack
        run: ./scripts/dev-up.sh

      - name: Wait for health checks
        run: ./scripts/integration/wait-for-health.sh

      - name: Run smoke tests
        run: ./scripts/integration/smoke-tests.sh

      - name: Run order flow placeholder test
        run: ./scripts/integration/order-flow.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --tail=200

      - name: Cleanup
        if: always()
        run: ./scripts/dev-down.sh --volumes
